name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        # Run the suite both without the MCP extra (the MCP tests skip via
        # importorskip) and with it (they run) — exercises the optional-dep
        # contract in both directions.
        extras: ["dev", "dev,mcp"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + deps
        run: pip install -e ".[${{ matrix.extras }}]"
      - name: Run tests
        run: pytest tests/ -v
